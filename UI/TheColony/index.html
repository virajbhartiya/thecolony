<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TheColony — Live</title>
  <meta name="viewport" content="width=1440" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* ink palette — dusty city at dusk */
      --ink-0: #0b0a10;
      --ink-1: #14121a;
      --ink-2: #1c1925;
      --ink-3: #261f30;
      --ink-4: #332a3f;
      --line:  #3a304a;
      --line-soft: #2a2236;

      --cream:    #ece6d3;
      --cream-dim:#c9c0a8;
      --mute:     #8a8478;
      --mute-2:   #5e5868;

      --amber:    #f0a347;
      --amber-2:  #ffc26b;
      --amber-deep: #b9722a;
      --teal:     #4ec5b8;
      --teal-deep:#1f7c75;
      --ruby:     #e2536e;
      --ruby-deep:#8e2738;
      --moss:     #95b876;
      --moss-deep:#4f7a3d;
      --violet:   #9b7fd1;

      /* terrain */
      --grass:    #5b7a45;
      --grass-2:  #4a6839;
      --grass-3:  #3a5530;
      --road:     #2c2630;
      --road-2:   #1f1a25;
      --road-line:#6b6478;
      --water:    #2f6e7a;
      --water-2:  #1f5660;
      --plaza:    #6b6450;
      --plaza-2:  #574f3f;
      --dirt:     #7a5a3e;
      --dirt-2:   #5e4530;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--ink-0); color: var(--cream); }
    body {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.01em;
      overflow: hidden;
      height: 100vh;
    }
    #root { width: 100vw; height: 100vh; }

    .pixel { font-family: "Silkscreen", monospace; letter-spacing: 0.04em; }
    .mono  { font-family: "JetBrains Mono", monospace; }

    /* CRT-ish scanline overlay across the canvas */
    .scanlines {
      position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(
        0deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 3px);
      mix-blend-mode: multiply;
      opacity: 0.45;
    }

    /* HUD panel base */
    .panel {
      background: linear-gradient(180deg, var(--ink-2), var(--ink-1));
      border: 1px solid var(--line);
      box-shadow: 0 0 0 1px var(--ink-0), 0 12px 28px rgba(0,0,0,0.6);
      position: relative;
    }
    .panel::before {
      /* inner highlight bevel */
      content: "";
      position: absolute; inset: 0;
      border-top: 1px solid rgba(255,255,255,0.04);
      border-left: 1px solid rgba(255,255,255,0.025);
      pointer-events: none;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(240,163,71,0.07), transparent);
    }
    .panel-title {
      font-family: "Silkscreen", monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--amber-2);
      text-transform: uppercase;
    }
    .panel-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--mute);
    }

    /* metric tile */
    .metric {
      display: flex; flex-direction: column; gap: 2px;
      padding: 6px 14px;
      border-right: 1px solid var(--line-soft);
      min-width: 100px;
    }
    .metric-label {
      font-family: "Silkscreen", monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--mute);
      text-transform: uppercase;
    }
    .metric-value {
      font-family: "JetBrains Mono", monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--cream);
      line-height: 1;
    }
    .metric-delta { font-size: 9px; font-family: "JetBrains Mono", monospace; }
    .delta-up   { color: var(--moss); }
    .delta-down { color: var(--ruby); }

    /* ticker rows */
    .event-row {
      display: grid; grid-template-columns: 56px 14px 1fr; gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px dashed var(--line-soft);
      font-size: 12px;
      line-height: 1.35;
      align-items: start;
    }
    .event-row .t { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--mute); padding-top: 2px; }
    .event-row .dot { width: 8px; height: 8px; margin-top: 5px; border-radius: 1px; }
    .event-row .body { color: var(--cream-dim); }
    .event-row strong { color: var(--cream); font-weight: 600; }
    .event-row.new { background: linear-gradient(90deg, rgba(240,163,71,0.10), transparent); }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 6px; border-radius: 2px;
      font-family: "Silkscreen", monospace;
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid currentColor;
    }
    .pill.alive  { color: var(--moss); }
    .pill.dead   { color: var(--ruby); }
    .pill.jailed { color: var(--amber); }
    .pill.bankrupt { color: var(--violet); }

    .bar {
      position: relative; height: 6px;
      background: var(--ink-3); border: 1px solid var(--line-soft);
      overflow: hidden;
    }
    .bar > i {
      display: block; height: 100%;
      background: var(--amber);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
    }

    /* drawer */
    .drawer {
      position: absolute;
      top: 56px; bottom: 56px; left: 16px;
      width: 360px;
      background: var(--ink-1);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px var(--ink-0);
      display: flex; flex-direction: column;
      overflow: hidden;
      z-index: 30;
    }
    .drawer-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
    }
    .drawer-section h4 {
      font-family: "Silkscreen", monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--mute);
      text-transform: uppercase;
      margin: 0 0 8px 0;
    }
    .drawer-scroll {
      flex: 1; overflow-y: auto;
    }
    .drawer-scroll::-webkit-scrollbar { width: 6px; }
    .drawer-scroll::-webkit-scrollbar-thumb { background: var(--ink-4); }
    .drawer-scroll::-webkit-scrollbar-track { background: var(--ink-1); }

    .iconbtn {
      width: 24px; height: 24px;
      border: 1px solid var(--line);
      background: var(--ink-2);
      color: var(--cream);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-family: "Silkscreen", monospace;
      font-size: 11px;
    }
    .iconbtn:hover { background: var(--ink-3); color: var(--amber-2); }

    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      background: var(--ink-2);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--cream-dim);
      cursor: pointer;
      user-select: none;
    }
    .chip:hover { border-color: var(--amber); color: var(--amber-2); }
    .chip.active { background: var(--amber-deep); border-color: var(--amber); color: var(--ink-0); }

    /* speech bubble */
    .bubble {
      position: absolute;
      transform: translate(-50%, -100%);
      background: var(--cream);
      color: var(--ink-0);
      font-family: "Space Grotesk", sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      max-width: 220px;
      border: 2px solid var(--ink-0);
      border-radius: 2px;
      pointer-events: none;
      white-space: normal;
      line-height: 1.25;
      z-index: 10;
    }
    .bubble::after {
      content: ""; position: absolute;
      left: 50%; bottom: -6px; transform: translateX(-50%);
      width: 8px; height: 8px; background: var(--cream);
      border-right: 2px solid var(--ink-0); border-bottom: 2px solid var(--ink-0);
      transform: translateX(-50%) rotate(45deg);
    }

    /* floating money */
    .money-float {
      position: absolute;
      transform: translate(-50%, -100%);
      font-family: "Silkscreen", monospace;
      font-size: 12px;
      pointer-events: none;
      text-shadow: 1px 1px 0 var(--ink-0);
      z-index: 9;
    }
    .money-float.up { color: var(--moss); }
    .money-float.down { color: var(--ruby); }

    /* obit feel */
    .obit-card {
      background: var(--ink-2);
      border: 1px solid var(--line);
      padding: 10px 12px;
      border-left: 3px solid var(--ruby);
      font-size: 12px;
      color: var(--cream-dim);
      line-height: 1.4;
    }

    /* selection ring for hovered/selected agent */
    .ring {
      position: absolute;
      pointer-events: none;
      border: 2px solid var(--amber);
      box-shadow: 0 0 0 1px var(--ink-0);
    }

    @keyframes pulse {
      0%,100% { opacity: 0.35; }
      50%     { opacity: 1; }
    }
    .pulse { animation: pulse 1.4s ease-in-out infinite; }

    /* Tweaks panel theming */
    om-tweaks-panel { color: var(--cream); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="sprites.jsx"></script>
  <script type="text/babel" src="city.jsx"></script>
  <script type="text/babel" src="hud.jsx"></script>
  <script type="text/babel" src="drawers.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
